<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rivera Boii's Garage</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #ffffff;
            --text-muted: #a0aec0;
            --border-color: #2d3748;
            --success: #10b981;
            --warning: #f59e0b;
            --dropdown-bg: #2d3748;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 16px;
        }

        .header h1 {
            font-size: 1.8rem;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .header p {
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .section {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
            color: var(--text-muted);
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            background: #2d3748;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            color: white;
            font-size: 1rem;
            margin-bottom: 10px;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        button {
            width: 100%;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 14px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: var(--accent-hover);
        }

        .output-card {
            background: #1a202c;
            border-radius: 8px;
            padding: 16px;
            margin-top: 20px;
            border: 1px solid var(--border-color);
            display: none;
        }

        .output-header {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 12px;
            color: var(--accent-color);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 6px;
        }

        .metric {
            margin-bottom: 14px;
            font-size: 1.1rem;
            background: #2d3748;
            padding: 12px;
            border-radius: 6px;
            border-left: 4px solid var(--accent-color);
        }

        .metric span {
            font-weight: bold;
            color: #fff;
        }

        /* Dropdown/Accordion Styles */
        .accordion-item {
            margin-top: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
        }

        .accordion-header {
            background: var(--dropdown-bg);
            padding: 14px;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            transition: background 0.2s;
        }

        .accordion-header:hover {
            background: #3a4a63;
        }

        .accordion-header::after {
            content: '▼';
            font-size: 0.8rem;
            color: var(--text-muted);
            transition: transform 0.2s;
        }

        .accordion-item.active .accordion-header::after {
            transform: rotate(180deg);
        }

        .accordion-content {
            background: #1a202c;
            padding: 0 14px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.2s ease-out, padding 0.2s ease-out;
            font-size: 0.95rem;
            line-height: 1.5;
            color: #e2e8f0;
        }

        .accordion-item.active .accordion-content {
            padding: 14px;
            max-height: 500px; /* High enough to accommodate content */
            border-top: 1px solid var(--border-color);
        }

        .quote-box {
            font-family: monospace;
            white-space: pre-wrap;
            background: #2d3748;
            padding: 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            border: 1px solid var(--border-color);
            color: #fff;
        }

        .copy-btn {
            background: var(--success);
            margin-top: 10px;
        }
        .copy-btn:hover {
            background: #059669;
        }

        .loading {
            text-align: center;
            color: var(--warning);
            font-weight: bold;
            display: none;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Welcome to Rivera Boii's Garage</h1>
        <p>Live Book Time, Custom Pricing & Text Quotes</p>
    </div>

    <div class="section">
        <label>Groq API Key</label>
        <input type="password" id="apiKey" placeholder="gsk_...">
    </div>

    <div class="section">
        <label>Vehicle & Repair Job Description</label>
        <input type="text" id="jobInput" placeholder="e.g., 2015 Chevy Tahoe alternator replacement">
    </div>

    <button onclick="calculateJob()">Analyze & Compute Quote</button>

    <div id="loading" class="loading">Consulting system mechanics...</div>

    <div id="output" class="output-card">
        <div class="output-header">⚡ INVESTIGATION DATA</div>
        
        <div id="pricingBlock" class="metric"></div>
        
        <div class="accordion-item">
            <div class="accordion-header" onclick="toggleAccordion(this)">🛠️ REQUIRED TOOLS</div>
            <div id="toolsContent" class="accordion-content"></div>
        </div>

        <div class="accordion-item">
            <div class="accordion-header" onclick="toggleAccordion(this)">⚠️ DIY TRAPS & TRICKS</div>
            <div id="trapsContent" class="accordion-content"></div>
        </div>

        <div class="accordion-item">
            <div class="accordion-header" onclick="toggleAccordion(this)">📱 SMS CUSTOMER QUOTE</div>
            <div class="accordion-content">
                <div id="quoteText" class="quote-box"></div>
                <button class="copy-btn" onclick="copyQuote()">Copy Text Message</button>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('apiKey').value = localStorage.getItem('rivera_garage_key') || '';

    // Simple Dropdown Toggle Engine
    function toggleAccordion(element) {
        const item = element.parentElement;
        item.classList.toggle('active');
    }

    async function calculateJob() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const job = document.getElementById('jobInput').value.trim();

        if(!apiKey || !job) {
            alert("Please input both your secret API Key and the target vehicle job description!");
            return;
        }

        localStorage.setItem('rivera_garage_key', apiKey);

        document.getElementById('loading').style.display = 'block';
        document.getElementById('output').style.display = 'none';

        // Collapse all dropdowns for a fresh start
        document.querySelectorAll('.accordion-item').forEach(el => el.classList.remove('active'));

        const systemPrompt = `You are the master mechanics server backend for Rivera Boii's Garage. Your job is to analyze vehicle repair queries and output EXACT structured mechanical repair telemetry.

CRITICAL INSTRUCTIONS:
1. You must ALWAYS directly address the shop owner as "Mr. Rivera" at the very beginning of the "REQUIRED_TOOLS" section and the "TRAPS_AND_TRICKS" section. (Example: "Mr. Rivera, for this job you will need...").
2. Estimate the precise mechanic book time hours required for the job.
3. Be hyper-realistic. 

You must format your response exactly like this template text block, with no conversational preamble:
BOOK_HOURS: [Only write a numeric value here, e.g., 2.5]
REQUIRED_TOOLS: [Write a concise note addressing Mr. Rivera regarding the essential tools needed]
TRAPS_AND_TRICKS: [Write a concise warning addressing Mr. Rivera about hidden problems, rust risks, or safety details]`;

        try {
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${apiKey}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: "llama3-8b-8192",
                    messages: [
                        { role: "system", content: systemPrompt },
                        { role: "user", content: `Analyze this repair job: ${job}` }
                    ],
                    temperature: 0.2
                })
            });

            const data = await response.json();
            const aiText = data.choices[0].message.content;
            
            const hoursMatch = aiText.match(/BOOK_HOURS:\s*([\d.]+)/);
            const toolsMatch = aiText.match(/REQUIRED_TOOLS:\s*([\s\S]*?)(?=TRAPS_AND_TRICKS:|$)/);
            const trapsMatch = aiText.match(/TRAPS_AND_TRICKS:\s*([\s\S]*?)$/);

            const hours = hoursMatch ? parseFloat(hoursMatch[1]) : 1.5;
            const tools = toolsMatch ? toolsMatch[1].trim() : "Standard socket set.";
            const traps = trapsMatch ? trapsMatch[1].trim() : "Watch for hidden clips.";

            const rate = 45;
            const cap = 250;
            let computedLabor = hours * rate;
            if(computedLabor > cap) {
                computedLabor = cap;
            }

            // Output data injection
            document.getElementById('pricingBlock').innerHTML = `Book Time: <span>${hours} Hrs</span> &nbsp;|&nbsp; Labor Cost: <span>$${computedLabor.toFixed(2)}</span>`;
            
            document.getElementById('toolsContent').innerHTML = `<p>${tools}</p>`;
            document.getElementById('trapsContent').innerHTML = `<p>${traps}</p>`;

            const smsTemplate = `Rivera Boii's Garage Quote:\n--------------------------------\nVehicle/Job: ${job}\nLabor Total: $${computedLabor.toFixed(2)}\n--------------------------------\nEstimated Out-The-Door Total: $${computedLabor.toFixed(2)}\n\nPlease let me know if you want to lock in your driveway appointment slot!`;

            document.getElementById('quoteText').innerText = smsTemplate;
            document.getElementById('output').style.display = 'block';

        } catch (error) {
            console.error(error);
            alert("Error parsing pipeline. Double check your API key status or connection.");
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }

    function copyQuote() {
        const text = document.getElementById('quoteText').innerText;
        navigator.clipboard.writeText(text);
        alert("Customer text quote copied directly to your device clipboard!");
    }
</script>

</body>
</html>
