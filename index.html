<!DOCTYPE html>
<html lang="en">
<head><footer style="text-align: center; margin-top: 20px; font-size: 0.8em; color: #888;">
    Built by Dallas Rivera
</footer>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rivera Boiis Garage</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #ff4757;
            --text-color: #ffffff;
            --text-muted: #a4b0be;
            --success-color: #2ed573;
            --warning-color: #ffa502;
            --error-color: #ff6b81;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        h1 {
            text-align: center;
            margin-bottom: 5px;
            font-size: 24px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .privacy-toggle {
            background: #2f3542;
            border: 1px solid #57606f;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 10px;
            padding: 11px;
        }

        .privacy-toggle:hover {
            background: #3b4252;
            color: var(--text-color);
        }

        .private-panel {
            display: none;
            border: 1px solid #57606f;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 15px;
            background: rgba(47, 53, 66, 0.45);
        }

        .private-panel.visible {
            display: block;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 13px;
            color: var(--text-muted);
            font-weight: bold;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            background-color: #2f3542;
            border: 1px solid #57606f;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        select {
            cursor: pointer;
        }

        .vehicle-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background-color: #ff6b81;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.65;
        }

        .results {
            display: none;
        }

        .price-box {
            background: linear-gradient(135deg, #2f3542, #1e1e1e);
            border-left: 4px solid var(--success-color);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
        }

        .price-box h3 {
            margin: 0;
            font-size: 28px;
            color: var(--success-color);
        }

        .section-title {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-color);
            margin-top: 15px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .content-text {
            font-size: 15px;
            line-height: 1.5;
            background-color: #2f3542;
            padding: 12px;
            border-radius: 8px;
            margin: 0;
            white-space: pre-line;
        }

        .accordion-item {
            border: 1px solid #57606f;
            border-radius: 8px;
            overflow: hidden;
            margin-top: 10px;
        }

        .accordion-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #2f3542;
            color: var(--text-color);
            border: 0;
            border-radius: 0;
            padding: 13px;
            font-size: 14px;
            text-align: left;
        }

        .accordion-header:hover {
            background: #3b4252;
        }

        .accordion-arrow {
            color: var(--text-muted);
            font-size: 12px;
            transition: transform 0.2s ease;
        }

        .accordion-item.active .accordion-arrow {
            transform: rotate(180deg);
        }

        .accordion-content {
            display: none;
            background: #252b36;
            border-top: 1px solid #57606f;
            padding: 12px;
        }

        .accordion-item.active .accordion-content {
            display: block;
        }

        .quote-box {
            color: #ffffff;
            background-color: #2f3542;
            border-radius: 8px;
            border: 1px solid #57606f;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 13px;
            line-height: 1.5;
            margin: 0;
            padding: 12px;
            white-space: pre-wrap;
        }

        .copy-btn {
            background: var(--success-color);
            margin-top: 10px;
        }

        .copy-btn:hover {
            background: #26c265;
        }

        #loading,
        #errorBox {
            display: none;
            margin: 10px 0;
        }

        #loading {
            text-align: center;
            color: var(--text-muted);
            font-style: italic;
        }

        #errorBox {
            color: var(--error-color);
            background: rgba(255, 107, 129, 0.1);
            border: 1px solid rgba(255, 107, 129, 0.35);
            border-radius: 8px;
            padding: 12px;
            font-size: 14px;
            line-height: 1.4;
        }

        #errorBox.success {
            color: var(--success-color);
            background: rgba(46, 213, 115, 0.1);
            border-color: rgba(46, 213, 115, 0.35);
        }

        .note {
            color: var(--warning-color);
            font-size: 12px;
            line-height: 1.4;
            margin-top: 10px;
        }

        @media (max-width: 430px) {
            .vehicle-grid,
            .pricing-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Rivera Boiis Garage</h1>
    <div class="subtitle">Time, Tools & Pricing</div>

    <div class="card">
        <div class="form-group">
            <label for="apiKey">Your Groq API Key</label>
            <input type="password" id="apiKey" placeholder="gsk_..." autocomplete="off">
        </div>
        <div class="vehicle-grid">
            <div class="form-group">
                <label for="vehicleYear">Year</label>
                <select id="vehicleYear">
                    <option value="">Select year</option>
                </select>
            </div>
            <div class="form-group">
                <label for="vehicleMake">Make</label>
                <select id="vehicleMake">
                    <option value="">Select make</option>
                    <option>Acura</option>
                    <option>Audi</option>
                    <option>BMW</option>
                    <option>Buick</option>
                    <option>Cadillac</option>
                    <option>Chevrolet</option>
                    <option>Chrysler</option>
                    <option>Dodge</option>
                    <option>Ford</option>
                    <option>GMC</option>
                    <option>Honda</option>
                    <option>Hyundai</option>
                    <option>Infiniti</option>
                    <option>Jeep</option>
                    <option>Kia</option>
                    <option>Lexus</option>
                    <option>Mazda</option>
                    <option>Mercedes-Benz</option>
                    <option>Nissan</option>
                    <option>Ram</option>
                    <option>Subaru</option>
                    <option>Toyota</option>
                    <option>Volkswagen</option>
                    <option>Volvo</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label for="vehicleDetails">Model / Engine</label>
            <input type="text" id="vehicleDetails" placeholder="e.g., Patriot 2.0L, Tahoe 5.3L V8" autocomplete="off">
        </div>
        <div class="form-group">
            <label for="job">Repair Job / Part Replacement</label>
            <input type="text" id="job" placeholder="e.g., Power steering pump" autocomplete="off">
        </div>
        <button id="pricingToggle" class="privacy-toggle" type="button">Show Private Pricing</button>
        <div id="privatePricing" class="private-panel">
            <div class="pricing-grid">
                <div class="form-group">
                    <label for="yourRate">Your Rate / Hr</label>
                    <input type="number" id="yourRate" min="0" step="5" value="45">
                </div>
                <div class="form-group">
                    <label for="maxQuote">Max Quote</label>
                    <input type="number" id="maxQuote" min="0" step="25" value="400">
                </div>
                <div class="form-group">
                    <label for="shopRate">Shop Rate / Hr</label>
                    <input type="number" id="shopRate" min="0" step="5" value="140">
                </div>
            </div>
        </div>
        <button id="estimateButton" type="button">Get Estimate</button>
        <div id="loading">Checking the estimate... hang tight...</div>
        <div id="errorBox"></div>
        <div class="note"> WE CAN DO THIS! LET'S GET IT DONE!</div>
    </div>

    <div id="resultsCard" class="card results">
        <div class="price-box">
            <span style="font-size: 12px; color: var(--text-muted); text-transform: uppercase;">Your Smart Friends & Family Quote</span>
            <h3 id="yourPrice">$0.00</h3>
            <div id="savingsText" style="font-size: 13px; color: var(--text-muted); margin-top: 5px;"></div>
        </div>

        <div class="section-title">Estimated Book Time</div>
        <p id="bookTime" class="content-text"></p>

        <div class="accordion-item active">
            <button class="accordion-header" type="button">
                <span>Required Tools</span>
                <span class="accordion-arrow">v</span>
            </button>
            <div class="accordion-content">
                <p id="toolsList" class="content-text"></p>
            </div>
        </div>

        <div class="accordion-item active">
            <button class="accordion-header" type="button">
                <span>Warnings & Past Problems</span>
                <span class="accordion-arrow">v</span>
            </button>
            <div class="accordion-content">
                <p id="trapsText" class="content-text"></p>
            </div>
        </div>

        <div class="accordion-item">
            <button class="accordion-header" type="button">
                <span>Text Message Quote</span>
                <span class="accordion-arrow">v</span>
            </button>
            <div class="accordion-content">
                <p id="quoteText" class="quote-box"></p>
                <button id="copyQuoteButton" class="copy-btn" type="button">Copy Text Message</button>
            </div>
        </div>
    </div>
</div>

<script>
    const modelName = "llama-3.1-8b-instant";

    document.addEventListener("DOMContentLoaded", () => {
        populateYears();

        const savedKey = localStorage.getItem("garage_api_key");
        if (savedKey) {
            document.getElementById("apiKey").value = savedKey;
        }

        document.getElementById("vehicleYear").value = localStorage.getItem("garage_vehicle_year") || "";
        document.getElementById("vehicleMake").value = localStorage.getItem("garage_vehicle_make") || "";
        document.getElementById("vehicleDetails").value = localStorage.getItem("garage_vehicle_details") || "";
        document.getElementById("yourRate").value = localStorage.getItem("garage_your_rate") || "45";
        document.getElementById("maxQuote").value = localStorage.getItem("garage_max_quote") || "400";
        document.getElementById("shopRate").value = localStorage.getItem("garage_shop_rate") || "140";

        document.getElementById("estimateButton").addEventListener("click", askUniversalAI);
        document.getElementById("pricingToggle").addEventListener("click", togglePrivatePricing);
        document.getElementById("copyQuoteButton").addEventListener("click", copyQuote);
        document.querySelectorAll(".accordion-header").forEach(header => {
            header.addEventListener("click", () => {
                header.closest(".accordion-item").classList.toggle("active");
            });
        });
    });

    function populateYears() {
        const yearSelect = document.getElementById("vehicleYear");
        const currentYear = new Date().getFullYear();

        for (let year = currentYear + 1; year >= 1985; year--) {
            const option = document.createElement("option");
            option.value = year.toString();
            option.textContent = year.toString();
            yearSelect.appendChild(option);
        }
    }

    function togglePrivatePricing() {
        const panel = document.getElementById("privatePricing");
        const button = document.getElementById("pricingToggle");
        const isVisible = panel.classList.toggle("visible");

        button.textContent = isVisible ? "Hide Private Pricing" : "Show Private Pricing";
    }

    function hidePrivatePricing() {
        document.getElementById("privatePricing").classList.remove("visible");
        document.getElementById("pricingToggle").textContent = "Show Private Pricing";
    }

    function setBusy(isBusy) {
        document.getElementById("loading").style.display = isBusy ? "block" : "none";
        document.getElementById("estimateButton").disabled = isBusy;
    }

    function showError(message) {
        const errorBox = document.getElementById("errorBox");
        errorBox.classList.remove("success");
        errorBox.textContent = message;
        errorBox.style.display = "block";
    }

    function showStatus(message) {
        const errorBox = document.getElementById("errorBox");
        errorBox.classList.add("success");
        errorBox.textContent = message;
        errorBox.style.display = "block";
    }

    function clearError() {
        const errorBox = document.getElementById("errorBox");
        errorBox.classList.remove("success");
        errorBox.textContent = "";
        errorBox.style.display = "none";
    }

    function parseEstimate(rawText) {
        const cleanedText = rawText
            .replace(/```json|```/g, "")
            .trim();

        const jsonStart = cleanedText.indexOf("{");
        const jsonEnd = cleanedText.lastIndexOf("}");
        const possibleJson = jsonStart >= 0 && jsonEnd > jsonStart
            ? cleanedText.slice(jsonStart, jsonEnd + 1)
            : cleanedText;

        try {
            const parsed = JSON.parse(possibleJson);

            return {
                hours: parsed.hours ?? parsed.book_time ?? parsed.bookTime ?? parsed.estimated_hours,
                tools: parsed.tools ?? parsed.required_tools ?? parsed.requiredTools ?? [],
                traps: parsed.traps ?? parsed.warnings ?? parsed.warning ?? parsed.problems ?? parsed.notes
            };
        } catch (error) {
            throw new Error("The AI answered, but not in the format this page expected. Try again, or make the job description more specific.");
        }
    }

    function buildTextQuote(vehicle, job, hours, calculatedPrice, wasCapped) {
        const capNote = wasCapped ? "\nNote: I capped the labor quote to keep it reasonable." : "";

        return [
            "Rivera Boiis Garage Quote",
            "--------------------------",
            `Vehicle: ${vehicle}`,
            `Job: ${job}`,
            `Estimated labor time: ${hours.toFixed(1)} hours`,
            `Labor quote: $${calculatedPrice.toFixed(2)}`,
            capNote,
            "",
            "Let me know if you want me to lock in a time to check it out."
        ].join("\n").replace(/\n\n\n/g, "\n\n");
    }

    async function copyQuote() {
        const text = document.getElementById("quoteText").textContent;

        try {
            await navigator.clipboard.writeText(text);
            showStatus("Text message quote copied.");
        } catch (error) {
            showError("The quote is ready, but this browser would not let me copy it automatically.");
        }
    }

    async function askUniversalAI() {
        const apiKey = document.getElementById("apiKey").value.trim();
        const vehicleYear = document.getElementById("vehicleYear").value;
        const vehicleMake = document.getElementById("vehicleMake").value;
        const vehicleDetails = document.getElementById("vehicleDetails").value.trim();
        const vehicle = `${vehicleYear} ${vehicleMake} ${vehicleDetails}`.trim();
        const job = document.getElementById("job").value.trim();
        const yourRate = Number(document.getElementById("yourRate").value);
        const maxQuote = Number(document.getElementById("maxQuote").value);
        const shopRate = Number(document.getElementById("shopRate").value);
        const resultsCard = document.getElementById("resultsCard");

        clearError();

        if (!apiKey || !vehicleYear || !vehicleMake || !vehicleDetails || !job) {
            showError("Please fill out your API key, year, make, model,engine, and repair job.");
            return;
        }

        if (!Number.isFinite(yourRate) || yourRate <= 0 || !Number.isFinite(maxQuote) || maxQuote <= 0 || !Number.isFinite(shopRate) || shopRate <= 0) {
            showError("Please enter positive numbers for your rate, max quote, and shop rate.");
            return;
        }

        localStorage.setItem("garage_api_key", apiKey);
        localStorage.setItem("garage_vehicle_year", vehicleYear);
        localStorage.setItem("garage_vehicle_make", vehicleMake);
        localStorage.setItem("garage_vehicle_details", vehicleDetails);
        localStorage.setItem("garage_your_rate", yourRate.toString());
        localStorage.setItem("garage_max_quote", maxQuote.toString());
        localStorage.setItem("garage_shop_rate", shopRate.toString());
        hidePrivatePricing();
        setBusy(true);
        resultsCard.style.display = "none";

        const systemPrompt = [
            "You are an experienced automotive repair estimator.",
            "Address the user as Mr. Rivera when writing the warnings.",
            "Give a realistic estimate for the user's vehicle and repair job.",
            "Focus especially on warnings, common failures, past problems mechanics see on this job, and things that can make the repair take longer.",
            "The user is in Fresno, California. Do not over-focus on rust or heat unless the specific job or vehicle makes rust or heat damage relevant.",
            "Prioritize Fresno-area realities when helpful: heat-baked plastic, brittle clips, dry rubber hoses, cooked seals, dust, sun damage, coolant and oil leaks, tight engine bay access, seized-by-heat fasteners, programming/calibration steps, fluid spills, safety risks, special tools, or parts commonly misdiagnosed.",
            "For tools, be specific. Include likely socket sizes, wrench sizes, Torx/Allen sizes, extensions, wobble joints, pullers, scan tools, fluid tools, torque wrench needs, jack/stand needs, and any specialty tools.",
            "If an exact size varies by trim, engine, aftermarket parts, or production change, say 'verify size' beside that item instead of guessing with false confidence.",
            "Return only valid JSON. Do not use markdown.",
            "Use this exact shape:",
            "{\"hours\":2.3,\"tools\":[\"10mm socket\",\"13mm wrench\",\"3/8 ratchet with 6 inch extension\",\"verify size: possible Torx fastener\"],\"traps\":\"detailed warnings, common past problems, and things to double-check before starting\"}"
        ].join(" ");

        const userPrompt = `Vehicle: ${vehicle}\nRepair job: ${job}`;

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${apiKey}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: modelName,
                    messages: [
                        { role: "system", content: systemPrompt },
                        { role: "user", content: userPrompt }
                    ],
                    temperature: 0.1,
                    response_format: { type: "json_object" }
                })
            });

            const responseBody = await response.json().catch(() => null);

            if (!response.ok) {
                const apiMessage = responseBody?.error?.message || `Status code ${response.status}`;
                throw new Error(`Groq API error: ${apiMessage}`);
            }

            const aiText = responseBody?.choices?.[0]?.message?.content;
            if (!aiText) {
                throw new Error("Groq responded, but the response did not include an estimate.");
            }

            const estimate = parseEstimate(aiText);
            const hours = Number(estimate.hours);

            if (!Number.isFinite(hours) || hours <= 0) {
                throw new Error("The estimate did not include a usable number of hours.");
            }

            const tools = Array.isArray(estimate.tools) ? estimate.tools : [];
            const toolsText = tools.length ? tools.map(tool => `- ${tool}`).join("\n") : "Specific socket and wrench sizes were not returned. Start with a metric socket set, extensions, pliers, torque wrench, jack stands, and verify fastener sizes before starting.";
            const trapsContent = estimate.traps || "Watch for hidden brackets, heat-baked plastic, brittle clips, dry rubber hoses, fluid leaks, and vehicle-specific removal steps. Double-check that the part was diagnosed correctly before replacing it.";

            const uncappedPrice = hours * yourRate;
            const calculatedPrice = Math.min(uncappedPrice, maxQuote);
            const wasCapped = uncappedPrice > maxQuote;

            const shopPrice = hours * shopRate;
            const savings = shopPrice - calculatedPrice;
            const capText = wasCapped
                ? `<br>Capped from <b>$${uncappedPrice.toFixed(2)}</b> so it does not go over your <b>$${maxQuote.toFixed(2)}</b> max.`
                : "";

            document.getElementById("yourPrice").innerText = `$${calculatedPrice.toFixed(2)}`;
            document.getElementById("savingsText").innerHTML = `Based on <b>$${yourRate.toFixed(2)}/hr</b>. Shops may charge around <b>$${shopPrice.toFixed(2)}</b>.<br>Family/friend discount: <b>$${savings.toFixed(2)}</b>.${capText}`;
            document.getElementById("bookTime").innerText = `${hours.toFixed(1)} Hours`;
            document.getElementById("toolsList").innerText = toolsText;
            document.getElementById("trapsText").innerText = trapsContent;
            document.getElementById("quoteText").textContent = buildTextQuote(vehicle, job, hours, calculatedPrice, wasCapped);

            resultsCard.style.display = "block";
            resultsCard.scrollIntoView({ behavior: "smooth" });
        } catch (error) {
            const likelyCors = error instanceof TypeError && error.message.toLowerCase().includes("fetch");
            const extraHelp = likelyCors
                ? " This can happen when an API blocks browser requests. The usual fix is to call Groq from a small backend server instead of directly from this HTML page."
                : "";

            showError(`${error.message}${extraHelp}`);
            console.error(error);
        } finally {
            setBusy(false);
        }
    }
</script>

</body>
</html>
