<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Garage Time Estimator</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #ff4757;
            --text-color: #ffffff;
            --text-muted: #a4b0be;
            --success-color: #2ed573;
            --warning-color: #ffa502;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        h1 {
            text-align: center;
            margin-bottom: 5px;
            font-size: 24px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 13px;
            color: var(--text-muted);
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            background-color: #2f3542;
            border: 1px solid #57606f;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
        }

        button:hover {
            background-color: #ff6b81;
        }

        .btn-secondary {
            background-color: #57606f;
        }
        .btn-secondary:hover {
            background-color: #747d8c;
        }

        .results {
            display: none;
        }

        .price-box {
            background: linear-gradient(135deg, #2f3542, #1e1e1e);
            border-left: 4px solid var(--success-color);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
        }

        .price-box h3 {
            margin: 5px 0;
            font-size: 32px;
            color: var(--success-color);
        }

        .difficulty-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .diff-easy { background-color: rgba(46, 213, 115, 0.2); color: var(--success-color); border: 1px solid var(--success-color); }
        .diff-medium { background-color: rgba(255, 165, 2, 0.2); color: var(--warning-color); border: 1px solid var(--warning-color); }
        .diff-hard { background-color: rgba(255, 71, 87, 0.2); color: var(--accent-color); border: 1px solid var(--accent-color); }

        .section-title {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-color);
            margin-top: 15px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .content-text {
            font-size: 15px;
            line-height: 1.5;
            background-color: #2f3542;
            padding: 12px;
            border-radius: 8px;
            margin: 0;
            white-space: pre-line;
        }

        #loading {
            display: none;
            text-align: center;
            color: var(--text-muted);
            font-style: italic;
            margin: 10px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Universal Garage Guide Pro</h1>
    <div class="subtitle">Live Book Time, Custom Pricing & Text Quotes</div>

    <div class="card">
        <div class="form-group">
            <label for="apiKey">Your Free Groq API Key</label>
            <input type="password" id="apiKey" placeholder="gsk_..." autocomplete="off">
        </div>
        <div class="form-group">
            <label for="vehicle">Vehicle (Year, Make, Model)</label>
            <input type="text" id="vehicle" placeholder="e.g., 2007 Chevy Tahoe" autocomplete="off">
        </div>
        <div class="form-group">
            <label for="job">Repair Job / Part Replacement</label>
            <input type="text" id="job" placeholder="e.g., Front control arm bushings" autocomplete="off">
        </div>
        <div class="form-group">
            <label for="partsCost">Parts Cost from Store ($ Optional)</label>
            <input type="number" id="partsCost" placeholder="e.g., 120" autocomplete="off">
        </div>
        <button onclick="askUniversalAI()">Get Real-Time Estimate</button>
        <div id="loading">Consulting local databases... hang tight...</div>
    </div>

    <div id="resultsCard" class="card results">
        <div style="text-align: center;">
            <div id="diffBadge" class="difficulty-badge">Medium Difficulty</div>
        </div>

        <div class="price-box">
            <span style="font-size: 12px; color: var(--text-muted); text-transform: uppercase;">Out the Door Quote (Parts + Labor)</span>
            <h3 id="yourPrice">$0.00</h3>
            <div id="breakdownText" style="font-size: 12px; color: var(--text-muted); margin-bottom: 5px;"></div>
            <div id="savingsText" style="font-size: 13px; color: var(--text-muted); border-top: 1px solid #57606f; padding-top: 5px; margin-top: 5px;"></div>
        </div>

        <button class="btn-secondary" onclick="copyQuoteToClipboard()">📋 Copy Professional Quote Text</button>

        <div class="section-title">Estimated Book Time</div>
        <p id="bookTime" class="content-text"></p>

        <div class="section-title">Required Tools</div>
        <p id="toolsList" class="content-text"></p>

        <div class="section-title">⚠️ DIY Traps & Tricks</div>
        <p id="trapsText" class="content-text"></p>
    </div>
</div>

<script>
    let lastQuoteData = null;

    document.addEventListener("DOMContentLoaded", () => {
        const savedKey = localStorage.getItem("garage_api_key");
        if (savedKey) {
            document.getElementById("apiKey").value = savedKey;
        }
    });

    async function askUniversalAI() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const vehicle = document.getElementById('vehicle').value.trim();
        const job = document.getElementById('job').value.trim();
        const partsCostRaw = document.getElementById('partsCost').value.trim();
        const loading = document.getElementById('loading');
        const resultsCard = document.getElementById('resultsCard');

        const partsCost = partsCostRaw ? parseFloat(partsCostRaw) : 0;

        if (!apiKey || !vehicle || !job) {
            alert('Please fill out your API Key, Vehicle, and Job!');
            return;
        }

        localStorage.setItem("garage_api_key", apiKey);
        loading.style.display = 'block';
        resultsCard.style.display = 'none';

        const systemPrompt = "You are an expert mechanic database. Provide details for the user's specific vehicle and job. You MUST reply in this exact plain text format without markdown styling:\n\nHOURS: [Just the decimal number of hours, e.g. 2.3]\nTOOLS: [Bullet list of tools]\nTRAPS: [Paragraph about hidden bolts, snaps, or specific mechanical rules]";
        const userPrompt = `Vehicle: ${vehicle}\nJob: ${job}`;

        try {
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${apiKey}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: "llama-3.1-8b-instant",
                    messages: [
                        { role: "system", content: systemPrompt },
                        { role: "user", content: userPrompt }
                    ],
                    temperature: 0.1
                })
            });

            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                const errorMessage = errorData.error?.message || `Status Code ${response.status}`;
                throw new Error(`Groq API Error: ${errorMessage}`);
            }

            const data = await response.json();
            const aiText = data.choices[0].message.content;

            const hoursMatch = aiText.match(/HOURS:\s*([\d.]+)/i);
            const toolsMatch = aiText.match(/TOOLS:\s*([\s\S]*?)(?=TRAPS:|$)/i);
            const trapsMatch = aiText.match(/TRAPS:\s*([\s\S]*)/i);

            let hours = hoursMatch ? parseFloat(hoursMatch[1]) : 1.5;
            let toolsText = toolsMatch ? toolsMatch[1].trim() : "Standard mechanic toolset";
            let trapsContent = trapsMatch ? trapsMatch[1].trim() : "Watch for hidden brackets and rust.";

            // New User Rules: $45/hr labor, maxed at $250 cap
            let rawLabor = hours * 45;
            let cappedLabor = rawLabor > 250 ? 250 : rawLabor;
            let totalQuote = cappedLabor + partsCost;

            // Commercial comparison ($140/hr shop rate + estimated 50% part markup)
            let shopLabor = hours * 140;
            let shopParts = partsCost * 1.5;
            let totalShopPrice = shopLabor + shopParts;
            let customerSavings = totalShopPrice - totalQuote;

            // Smart Difficulty Meter Check
            const lowerTraps = trapsContent.toLowerCase();
            const badge = document.getElementById('diffBadge');
            let difficulty = "Medium Difficulty";
            badge.className = "difficulty-badge";

            if (lowerTraps.includes("torch") || lowerTraps.includes("press") || lowerTraps.includes("subframe") || lowerTraps.includes("drop the engine") || hours > 4) {
                difficulty = "🔴 Expert / High Risk";
                badge.classList.add('diff-hard');
            } else if (hours <= 1.5 && !lowerTraps.includes("hidden")) {
                difficulty = "🟢 Easy / Quick Fix";
                badge.classList.add('diff-easy');
            } else {
                difficulty = "🟡 Medium Difficulty";
                badge.classList.add('diff-medium');
            }
            badge.innerText = difficulty;

            // Update Screen Numbers
            document.getElementById('yourPrice').innerText = `$${totalQuote.toFixed(2)}`;
            document.getElementById('breakdownText').innerHTML = `Labor: $${cappedLabor.toFixed(2)} (${hours} hrs @ $45) | Parts: $${partsCost.toFixed(2)}`;
            document.getElementById('savingsText').innerHTML = `Commercial shops would charge ~<b>$${totalShopPrice.toFixed(2)}</b>.<br>You save them <b>$${customerSavings.toFixed(2)}</b>!`;
            document.getElementById('bookTime').innerText = `${hours} Hours`;
            document.getElementById('toolsList').innerText = toolsText;
            document.getElementById('trapsText').innerText = trapsContent;

            // Save state for clipboard copying
            lastQuoteData = {
                vehicle, job, hours, totalQuote, cappedLabor, partsCost, trapsContent
            };

            loading.style.display = 'none';
            resultsCard.style.display = 'block';
            resultsCard.scrollIntoView({ behavior: 'smooth' });

        } catch (error) {
            loading.style.display = 'none';
            alert(error.message);
            console.error(error);
        }
    }

    function copyQuoteToClipboard() {
        if (!lastQuoteData) return;
        
        const text = `⚡ JG GARAGE SERVICE ESTIMATE ⚡\n` +
                     `---------------------------\n` +
                     `🚘 Vehicle: ${lastQuoteData.vehicle}\n` +
                     `🔧 Service: ${lastQuoteData.job}\n` +
                     `⏱️ Book Time: ${lastQuoteData.hours} Hours\n\n` +
                     `💵 PRICE BREAKDOWN:\n` +
                     `   • Labor: $${lastQuoteData.cappedLabor.toFixed(2)}\n` +
                     `   • Parts: $${lastQuoteData.partsCost.toFixed(2)}\n` +
                     `💰 TOTAL OUT-THE-DOOR: $${lastQuoteData.totalQuote.toFixed(2)}\n\n` +
                     `⚠️ MECHANIC NOTE:\n` +
                     `"${lastQuoteData.trapsContent.substring(0, 180)}..."`;

        navigator.clipboard.writeText(text).then(() => {
            alert("Professional text quote copied to your clipboard! Go paste it into your messages!");
        }).catch(err => {
            alert("Could not automatically copy text. Copy it manually from the screen!");
        });
    }
</script>

</body>
</html>
