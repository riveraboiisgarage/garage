<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rivera Boii's Garage</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #ffffff;
            --text-muted: #a0aec0;
            --border-color: #2d3748;
            --success: #10b981;
            --warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 16px;
        }

        .header h1 {
            font-size: 1.8rem;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .header p {
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .section {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
            color: var(--text-muted);
        }

        input[type="text"], input[type="number"], textarea {
            width: 100%;
            background: #2d3748;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            color: white;
            font-size: 1rem;
            margin-bottom: 10px;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        button {
            width: 100%;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 14px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: var(--accent-hover);
        }

        .output-card {
            background: #1a202c;
            border-radius: 8px;
            padding: 16px;
            margin-top: 20px;
            border: 1px solid var(--border-color);
            display: none;
        }

        .output-header {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 12px;
            color: var(--accent-color);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 6px;
        }

        .metric {
            margin-bottom: 8px;
            font-size: 1rem;
        }

        .metric span {
            font-weight: bold;
        }

        .quote-box {
            background: #2d3748;
            padding: 12px;
            border-radius: 6px;
            font-family: monospace;
            white-space: pre-wrap;
            font-size: 0.9rem;
            margin-top: 10px;
            border: 1px solid var(--border-color);
        }

        .copy-btn {
            background: var(--success);
            margin-top: 8px;
        }
        .copy-btn:hover {
            background: #059669;
        }

        .loading {
            text-align: center;
            color: var(--warning);
            font-weight: bold;
            display: none;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Welcome to Rivera Boii's Garage</h1>
        <p>Live Book Time, Custom Pricing & Text Quotes</p>
    </div>

    <div class="section">
        <label>Groq API Key</label>
        <input type="text" id="apiKey" placeholder="gsk_...">
    </div>

    <div class="section">
        <label>Vehicle & Repair Job Description</label>
        <input type="text" id="jobInput" placeholder="e.g., 2015 Chevy Tahoe alternator replacement">
    </div>

    <div class="section">
        <label>Parts Cost ($)</label>
        <input type="number" id="partsInput" placeholder="0.00" value="0">
    </div>

    <button onclick="calculateJob()">Analyze & Compute Quote</button>

    <div id="loading" class="loading">Consulting system mechanics...</div>

    <div id="output" class="output-card">
        <div class="output-header">⚡ INVESTIGATION DATA</div>
        <div id="bookTime" class="metric"></div>
        <div id="laborCost" class="metric"></div>
        <div id="totalCost" class="metric"></div>
        
        <div style="margin-top: 12px;" id="toolsArea"></div>
        <div style="margin-top: 12px;" id="trapsArea"></div>

        <div class="output-header" style="margin-top: 20px;">📱 SMS CUSTOMER QUOTE</div>
        <div id="quoteText" class="quote-box"></div>
        <button class="copy-btn" onclick="copyQuote()">Copy Text Message</button>
    </div>
</div>

<script>
    document.getElementById('apiKey').value = localStorage.getItem('rivera_garage_key') || '';

2. Estimate the precise mechanic book time hours required for the job.
3. Be hyper-realistic.

BOOK_HOURS: [Only write a numeric value here, e.g., 2.5]
REQUIRED_TOOLS: [Write a concise note addressing Mr. Rivera regarding the essential tools needed]
TRAPS_AND_TRICKS: [Write a concise warning addressing Mr. Rivera about hidden problems, rust risks, or safety details]`;

        try {
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {

                    'Authorization': `Bearer ${apiKey}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: "llama3-8b-8192",
                    messages: [
                        { role: "system", content: systemPrompt },
                        { role: "user", content: `Analyze this repair job: ${job}` }
                    ],
                    temperature: 0.2
                })
            });
