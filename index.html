<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Garage Time Estimator</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #ff4757;
            --text-color: #ffffff;
            --text-muted: #a4b0be;
            --success-color: #2ed573;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        h1 {
            text-align: center;
            margin-bottom: 5px;
            font-size: 24px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 13px;
            color: var(--text-muted);
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            background-color: #2f3542;
            border: 1px solid #57606f;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background-color: #ff6b81;
        }

        .results {
            display: none;
        }

        .price-box {
            background: linear-gradient(135deg, #2f3542, #1e1e1e);
            border-left: 4px solid var(--success-color);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
        }

        .price-box h3 {
            margin: 0;
            font-size: 28px;
            color: var(--success-color);
        }

        .section-title {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-color);
            margin-top: 15px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .content-text {
            font-size: 15px;
            line-height: 1.5;
            background-color: #2f3542;
            padding: 12px;
            border-radius: 8px;
            margin: 0;
            white-space: pre-line;
        }

        #loading {
            display: none;
            text-align: center;
            color: var(--text-muted);
            font-style: italic;
            margin: 10px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Universal Garage Guide</h1>
    <div class="subtitle">Live AI Book Time, Tools & Custom Pricing</div>

    <div class="card">
        <div class="form-group">
            <label for="apiKey">Your Free Groq API Key (Saved Automatically)</label>
            <input type="password" id="apiKey" placeholder="gsk_..." autocomplete="off">
        </div>
        <div class="form-group">
            <label for="vehicle">Vehicle (Year, Make, Model, Engine)</label>
            <input type="text" id="vehicle" placeholder="e.g., 2015 Chevy Tahoe 5.3L V8" autocomplete="off">
        </div>
        <div class="form-group">
            <label for="job">Repair Job / Part Replacement</label>
            <input type="text" id="job" placeholder="e.g., Power steering pump" autocomplete="off">
        </div>
        <button onclick="askUniversalAI()">Get Real-Time Estimate</button>
        <div id="loading">Looking up mechanic databases... hang tight...</div>
    </div>

    <div id="resultsCard" class="card results">
        <div class="price-box">
            <span style="font-size: 12px; color: var(--text-muted); text-transform: uppercase;">Your Smart Friends & Family Quote</span>
            <h3 id="yourPrice">$0.00</h3>
            <div id="savingsText" style="font-size: 13px; color: var(--text-muted); margin-top: 5px;"></div>
        </div>

        <div class="section-title">Estimated Book Time</div>
        <p id="bookTime" class="content-text"></p>

        <div class="section-title">Required Tools</div>
        <p id="toolsList" class="content-text"></p>

        <div class="section-title">⚠️ DIY Traps & Tricks</div>
        <p id="trapsText" class="content-text"></p>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const savedKey = localStorage.getItem("garage_api_key");
        if (savedKey) {
            document.getElementById("apiKey").value = savedKey;
        }
    });

    async function askUniversalAI() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const vehicle = document.getElementById('vehicle').value.trim();
        const job = document.getElementById('job').value.trim();
        const loading = document.getElementById('loading');
        const resultsCard = document.getElementById('resultsCard');

        if (!apiKey || !vehicle || !job) {
            alert('Please fill out your API Key, Vehicle, and Job!');
            return;
        }

        localStorage.setItem("garage_api_key", apiKey);
        loading.style.display = 'block';
        resultsCard.style.display = 'none';

        const systemPrompt = "You are an expert mechanic database. Provide details for the user's specific vehicle and job. You MUST reply in this exact plain text format without markdown styling:\n\nHOURS: [Just the decimal number of hours, e.g. 2.3]\nTOOLS: [Bullet list of tools]\nTRAPS: [Paragraph about hidden bolts, snaps, or specific mechanical rules]";
        const userPrompt = `Vehicle: ${vehicle}\nJob: ${job}`;

        try {
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${apiKey}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: "llama-3.1-8b-instant", // Updated to the most current 2026 free-tier model name
                    messages: [
                        { role: "system", content: systemPrompt },
                        { role: "user", content: userPrompt }
                    ],
                    temperature: 0.1
                })
            });

            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                const errorMessage = errorData.error?.message || `Status Code ${response.status}`;
                throw new Error(`Groq API Error: ${errorMessage}`);
            }

            const data = await response.json();
            const aiText = data.choices[0].message.content;

            const hoursMatch = aiText.match(/HOURS:\s*([\d.]+)/i);
            const toolsMatch = aiText.match(/TOOLS:\s*([\s\S]*?)(?=TRAPS:|$)/i);
            const trapsMatch = aiText.match(/TRAPS:\s*([\s\S]*)/i);

            let hours = hoursMatch ? parseFloat(hoursMatch[1]) : 1.5;
            let toolsText = toolsMatch ? toolsMatch[1].trim() : "Standard mechanic toolset";
            let trapsContent = trapsMatch ? trapsMatch[1].trim() : "Watch for hidden brackets and rust.";

            let calculatedPrice = hours * 60; 
            if (calculatedPrice > 200) {
                calculatedPrice = 200; 
            }
            let shopPrice = hours * 140; 
            let savings = shopPrice - calculatedPrice;

            document.getElementById('yourPrice').innerText = `$${calculatedPrice.toFixed(2)}`;
            document.getElementById('savingsText').innerHTML = `Shops would charge around <b>$${shopPrice.toFixed(2)}</b>.<br>You save them <b>$${savings.toFixed(2)}</b>!`;
            document.getElementById('bookTime').innerText = `${hours} Hours`;
            document.getElementById('toolsList').innerText = toolsText;
            document.getElementById('trapsText').innerText = trapsContent;

            loading.style.display = 'none';
            resultsCard.style.display = 'block';
            resultsCard.scrollIntoView({ behavior: 'smooth' });

        } catch (error) {
            loading.style.display = 'none';
            alert(error.message);
            console.error(error);
        }
    }
</script>

</body>
</html>
